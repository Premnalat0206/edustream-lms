{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>EduStream Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
height:100vh;
background:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.login-card{
width:400px;
padding:45px;
background:rgba(255,255,255,0.18);
backdrop-filter:blur(14px);
border-radius:18px;
box-shadow:0 15px 45px rgba(0,0,0,0.35);
color:white;
transition:0.3s;
}

.login-card:hover{
transform:translateY(-5px);
}

.logo{
font-size:34px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.input-group-text{
background:#fff;
}

.form-control{
border:none;
}

.btn-login{
background:#4CAF50;
border:none;
transition:0.3s;
}

.btn-login:hover{
background:#3e8e41;
transform:scale(1.05);
}

.register-link{
text-align:center;
margin-top:18px;
}

.register-link a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
EduStream
</div>

<form method="POST">

{% csrf_token %}

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<button type="submit"
class="btn btn-login w-100">
Login
</button>

</form>

<div class="register-link">

<p>New user?</p>

<a href="{% url 'register' %}"
class="btn btn-light w-100">
Create Account
</a>

</div>

</div>

</body>
</html>
