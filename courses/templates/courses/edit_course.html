{% extends 'courses/base.html' %}

{% block content %}

<style>

.form-wrapper{
max-width:850px;
margin:auto;
background:rgba(17,24,39,0.95);
padding:40px;
border-radius:30px;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.form-title{
font-size:48px;
font-weight:700;
margin-bottom:10px;
}

.form-subtitle{
color:#9ca3af;
margin-bottom:35px;
}

.form-control,
.form-select{
padding:14px;
border-radius:14px;
margin-bottom:20px;
}

.submit-btn{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
border:none;
padding:16px;
width:100%;
border-radius:16px;
font-size:20px;
font-weight:700;
color:white;
transition:0.3s;
}

.submit-btn:hover{
transform:translateY(-2px);
}

</style>

<div class="form-wrapper">

<h1 class="form-title">
✏️ Edit Course
</h1>

<p class="form-subtitle">
Update course information and pricing.
</p>

<form method="POST"
enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button type="submit"
class="submit-btn">

Update Course

</button>

</form>

</div>

{% endblock %}
