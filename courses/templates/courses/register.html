{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>EduStream Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
height:100vh;
background:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.register-card{
width:450px;
padding:45px;
background:rgba(255,255,255,0.18);
backdrop-filter:blur(14px);
border-radius:18px;
box-shadow:0 15px 45px rgba(0,0,0,0.35);
color:white;
transition:0.3s;
}

.register-card:hover{
transform:translateY(-5px);
}

.logo{
font-size:34px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.input-group-text{
background:#fff;
}

.form-control{
border:none;
}

.btn-register{
background:#4CAF50;
border:none;
transition:0.3s;
}

.btn-register:hover{
background:#3e8e41;
transform:scale(1.05);
}

.login-link{
text-align:center;
margin-top:18px;
}

.login-link a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="register-card">

<div class="logo">
EduStream
</div>

<form method="POST">

{% csrf_token %}

{% if error %}
<div class="alert alert-danger alert-dismissible fade show">

{{ error }}

<button type="button"
class="btn-close"
data-bs-dismiss="alert">
</button>

</div>
{% endif %}

<!-- FIRST NAME -->

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input type="text"
name="first_name"
class="form-control"
placeholder="First Name"
required>

</div>

<!-- LAST NAME -->

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input type="text"
name="last_name"
class="form-control"
placeholder="Last Name"
required>

</div>

<!-- USERNAME -->

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa fa-at"></i>
</span>

<input type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<!-- PASSWORD -->

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password"
name="password1"
class="form-control"
placeholder="Password"
required>

</div>

<!-- CONFIRM PASSWORD -->

<div class="input-group mb-4">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password"
name="password2"
class="form-control"
placeholder="Confirm Password"
required>

</div>

<button type="submit"
class="btn btn-register w-100">

Create Account

</button>

</form>

<div class="login-link">

<p class="mt-3">
Already have an account?
</p>

<a href="{% url 'login' %}"
class="btn btn-light w-100">

Login

</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
