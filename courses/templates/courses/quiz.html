{% extends "courses/base.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="mb-4 text-center">Final Course Quiz</h2>

<form method="POST">
{% csrf_token %}

{% for q in questions %}

<div class="card mb-4 shadow-sm">

<div class="card-body">

<h5 class="card-title">
Question {{ forloop.counter }}: {{ q.question }}
</h5>

<div class="mt-3">

<div class="form-check">
<input class="form-check-input" type="radio" name="question_{{ q.id }}" value="1">
<label class="form-check-label">
{{ q.option1 }}
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="question_{{ q.id }}" value="2">
<label class="form-check-label">
{{ q.option2 }}
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="question_{{ q.id }}" value="3">
<label class="form-check-label">
{{ q.option3 }}
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="question_{{ q.id }}" value="4">
<label class="form-check-label">
{{ q.option4 }}
</label>
</div>

</div>

</div>

</div>

{% endfor %}

<div class="text-center mt-4">

<button class="btn btn-success btn-lg">
Submit Quiz
</button>

</div>

</form>

</div>

{% endblock %}
